import json
import os
import smtplib
from datetime import datetime, timezone, timedelta
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart
from email.mime.base import MIMEBase
from email import encoders
from pathlib import Path

import math
import matplotlib.pyplot as plt

from scan_today_setups import run_scan, fetch_bars_timeframe


def load_env_file(env_path: Path) -> None:
    if not env_path.exists():
        return
    for raw_line in env_path.read_text().splitlines():
        line = raw_line.strip()
        if not line or line.startswith('#') or '=' not in line:
            continue
        key, value = line.split('=', 1)
        key = key.strip()
        value = value.strip().strip('"').strip("'")
        if key and key not in os.environ:
            os.environ[key] = value


def sma(v, i, n):
    if i + 1 < n:
        return float('nan')
    w = v[i - n + 1:i + 1]
    if any(math.isnan(x) for x in w):
        return float('nan')
    return sum(w) / n


def std(v, i, n):
    m = sma(v, i, n)
    if math.isnan(m):
        return float('nan')
    w = v[i - n + 1:i + 1]
    return (sum((x - m) ** 2 for x in w) / n) ** 0.5


def ema(v, n):
    out = [float('nan')] * len(v)
    alpha = 2 / (n + 1)
    seeded = False
    prev = float('nan')
    for i, x in enumerate(v):
        if not seeded:
            b = sma(v, i, n)
            if not math.isnan(b):
                out[i] = b
                prev = b
                seeded = True
            continue
        prev = alpha * x + (1 - alpha) * prev
        out[i] = prev
    return out


def rsi(v, n):
    out = [float('nan')] * len(v)
    if len(v) <= n:
        return out
    gs = ls = 0.0
    for i in range(1, n + 1):
        ch = v[i] - v[i - 1]
        gs += max(ch, 0)
        ls += max(-ch, 0)
    ag = gs / n
    al = ls / n
    out[n] = 100 if al == 0 else 100 - 100 / (1 + ag / al)
    for i in range(n + 1, len(v)):
        ch = v[i] - v[i - 1]
        g = max(ch, 0)
        l = max(-ch, 0)
        ag = (ag * (n - 1) + g) / n
        al = (al * (n - 1) + l) / n
        out[i] = 100 if al == 0 else 100 - 100 / (1 + ag / al)
    return out


def compute_indicators(close):
    n = len(close)
    bb_mid = [sma(close, i, 21) for i in range(n)]
    bb_dev = [2 * std(close, i, 21) for i in range(n)]
    bb_up = [bb_mid[i] + bb_dev[i] if not math.isnan(bb_mid[i]) and not math.isnan(bb_dev[i]) else float('nan') for i in range(n)]
    bb_dn = [bb_mid[i] - bb_dev[i] if not math.isnan(bb_mid[i]) and not math.isnan(bb_dev[i]) else float('nan') for i in range(n)]

    macd_fast = ema(close, 8)
    macd_slow = ema(close, 21)
    macd_line = [macd_fast[i] - macd_slow[i] if not math.isnan(macd_fast[i]) and not math.isnan(macd_slow[i]) else float('nan') for i in range(n)]
    macd_signal = ema([0 if math.isnan(v) else v for v in macd_line], 5)
    macd_hist = [(macd_line[i] - macd_signal[i]) if not math.isnan(macd_line[i]) and not math.isnan(macd_signal[i]) else float('nan') for i in range(n)]

    rsi_13 = rsi(close, 13)
    stoch_raw = [float('nan')] * n
    for i in range(n):
        if i + 1 < 21:
            continue
        w = rsi_13[i - 20:i + 1]
        if any(math.isnan(x) for x in w):
            continue
        lo = min(w)
        hi = max(w)
        stoch_raw[i] = 50 if hi == lo else 100 * (rsi_13[i] - lo) / (hi - lo)
    stoch_k = [sma(stoch_raw, i, 3) for i in range(n)]
    stoch_d = [sma(stoch_k, i, 5) for i in range(n)]

    return bb_mid, bb_up, bb_dn, macd_line, macd_signal, macd_hist, stoch_k, stoch_d


def render_chart(ticker: str, timeframe: str, out_path: Path) -> bool:
    end_dt = datetime.now(timezone.utc).date().isoformat()
    if timeframe.endswith('m'):
        lookback_days = 30
    elif timeframe.endswith('w'):
        lookback_days = 730
    else:
        lookback_days = 260
    start_dt = (datetime.now(timezone.utc).date() - timedelta(days=lookback_days)).isoformat()

    bars = fetch_bars_timeframe(ticker, start_dt, end_dt, timeframe)
    if len(bars) < 80:
        return False

    bars = bars[-140:]
    x = list(range(len(bars)))
    close = [b['c'] for b in bars]
    bb_mid, bb_up, bb_dn, macd_line, macd_signal, macd_hist, stoch_k, stoch_d = compute_indicators(close)

    fig, axes = plt.subplots(3, 1, figsize=(12, 8), sharex=True, gridspec_kw={'height_ratios': [3, 1.5, 1.5]})

    axes[0].plot(x, close, label='Close', color='black', linewidth=1.3)
    axes[0].plot(x, bb_mid, label='BB Mid', color='blue', linewidth=1.0)
    axes[0].plot(x, bb_up, label='BB Upper', color='gray', linewidth=1.0)
    axes[0].plot(x, bb_dn, label='BB Lower', color='gray', linewidth=1.0)
    axes[0].set_title(f'{ticker} - {timeframe} (Close + Bollinger Bands)')
    axes[0].legend(loc='upper left', fontsize=8)
    axes[0].grid(alpha=0.2)

    axes[1].bar(x, macd_hist, label='MACD Hist', color='lightgray')
    axes[1].plot(x, macd_line, label='MACD', color='purple', linewidth=1.0)
    axes[1].plot(x, macd_signal, label='Signal', color='orange', linewidth=1.0)
    axes[1].set_title('MACD')
    axes[1].legend(loc='upper left', fontsize=8)
    axes[1].grid(alpha=0.2)

    axes[2].plot(x, stoch_k, label='StochRSI K', color='green', linewidth=1.0)
    axes[2].plot(x, stoch_d, label='StochRSI D', color='red', linewidth=1.0)
    axes[2].axhline(20, color='gray', linestyle='--', linewidth=0.8)
    axes[2].axhline(80, color='gray', linestyle='--', linewidth=0.8)
    axes[2].set_ylim(0, 100)
    axes[2].set_title('StochRSI')
    axes[2].legend(loc='upper left', fontsize=8)
    axes[2].grid(alpha=0.2)

    plt.tight_layout()
    fig.savefig(out_path, dpi=120)
    plt.close(fig)
    return True


def ensure_dir(path: Path) -> None:
    path.mkdir(parents=True, exist_ok=True)


def build_email_body(result: dict) -> str:
    counts = result.get('counts', {})
    lines = []
    lines.append(f"Timeframe: {result.get('timeframe')}")
    lines.append(f"Scan Date: {result.get('scan_date')}")
    lines.append(
        "Counts: "
        f"long_now={counts.get('long_now', 0)}, "
        f"short_now={counts.get('short_now', 0)}, "
        f"upcoming_long={counts.get('upcoming_long', 0)}, "
        f"upcoming_short={counts.get('upcoming_short', 0)}, "
        f"scanned={counts.get('scanned', 0)}"
    )
    lines.append("")

    def section(title: str, key: str) -> None:
        rows = result.get(key, [])
        lines.append(f"{title} ({len(rows)}):")
        if not rows:
            lines.append("  - none")
            lines.append("")
            return
        for row in rows:
            lines.append(f"  - {row['ticker']} @ {row['close']} ({row['date']})")
        lines.append("")

    section("LONG NOW", "long_now")
    section("SHORT NOW", "short_now")
    section("UPCOMING LONG", "upcoming_long")
    section("UPCOMING SHORT", "upcoming_short")

    return "\n".join(lines).strip() + "\n"


def send_email(subject: str, body: str, attachments: list[Path]) -> None:
    host = os.environ.get('SMTP_HOST')
    port = int(os.environ.get('SMTP_PORT', '587'))
    username = os.environ.get('SMTP_USERNAME')
    password = os.environ.get('SMTP_PASSWORD')
    from_email = os.environ.get('FROM_EMAIL')
    to_email = os.environ.get('TO_EMAIL')

    if not all([host, username, password, from_email, to_email]):
        raise RuntimeError('Missing SMTP env vars. Required: SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD, FROM_EMAIL, TO_EMAIL')

    msg = MIMEMultipart()
    msg.attach(MIMEText(body, 'plain'))
    msg['Subject'] = subject
    msg['From'] = from_email
    msg['To'] = to_email

    for file_path in attachments:
        part = MIMEBase('application', 'octet-stream')
        part.set_payload(file_path.read_bytes())
        encoders.encode_base64(part)
        part.add_header('Content-Disposition', f'attachment; filename="{file_path.name}"')
        msg.attach(part)

    with smtplib.SMTP(host, port) as server:
        server.starttls()
        server.login(username, password)
        server.sendmail(from_email, [to_email], msg.as_string())


def run_one(timeframe: str, out_dir: Path) -> dict:
    result = run_scan(timeframe=timeframe)
    now_utc = datetime.now(timezone.utc).strftime('%Y%m%dT%H%M%SZ')
    filename = out_dir / f"setup_scan_{timeframe}_{now_utc}.json"
    filename.write_text(json.dumps(result, indent=2))
    print(f"Saved {filename}")
    return result


def main() -> None:
    load_env_file(Path('.env'))

    timeframes_raw = os.environ.get('SCAN_TIMEFRAMES', '1d,233m,1w')
    timeframes = [t.strip() for t in timeframes_raw.split(',') if t.strip()]

    out_dir = Path('data/setup_scans')
    ensure_dir(out_dir)

    all_results = []
    for tf in timeframes:
        all_results.append(run_one(tf, out_dir))

    hit_tickers = set()
    for res in all_results:
        for key in ('long_now', 'short_now', 'upcoming_long', 'upcoming_short'):
            for row in res.get(key, []):
                hit_tickers.add(row['ticker'])

    charts_dir = out_dir / 'charts'
    ensure_dir(charts_dir)
    attachments: list[Path] = []
    confirmation_timeframes = ['1d', '233m', '1w']
    for ticker in sorted(hit_tickers):
        for tf in confirmation_timeframes:
            chart_path = charts_dir / f'{ticker}_{tf}.png'
            try:
                ok = render_chart(ticker, tf, chart_path)
                if ok:
                    attachments.append(chart_path)
            except Exception:
                continue

    parts = []
    for res in all_results:
        parts.append(build_email_body(res))

    subject = f"Setup Scan Alert - {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}"
    body = "\n\n".join(parts)

    send_email(subject, body, attachments)
    print('Email sent')


if __name__ == '__main__':
    main()
