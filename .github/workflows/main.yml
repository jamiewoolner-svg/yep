name: King Kam Market Briefing

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9 AM ET pre-market
    - cron: '0 17 * * 1-5'   # 12 PM ET midday
    - cron: '0 20 * * 1-5'   # 3 PM ET afternoon wrap
  workflow_dispatch: {}

jobs:
  scan-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run King Kam briefing scan and email
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python -m pip install --upgrade pip
          python scripts/run_scheduled_scan_and_email.py
